<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Farmacia</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #4a90e2 0%, #3c7dc4 100%);
      color: #333;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #fff;
      width: 360px;
      border-radius: 16px;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.18);
      overflow: hidden;
    }

    .login-header {
      background: #2e7d32;
      color: #fff;
      padding: 24px;
      text-align: center;
    }

    .login-header h1 {
      margin: 0;
      font-size: 1.75rem;
    }

    .login-header p {
      margin: 8px 0 0;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .login-form {
      padding: 24px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      font-size: 1rem;
      box-sizing: border-box;
      transition: border-color 0.2s ease;
    }

    .form-group input:focus {
      outline: none;
      border-color: #2e7d32;
      box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.12);
    }

    .form-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .form-actions label {
      display: flex;
      align-items: center;
      font-size: 0.9rem;
      color: #555;
    }

    .form-actions input[type="checkbox"] {
      margin-right: 8px;
      accent-color: #2e7d32;
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      background: #2e7d32;
      color: #fff;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .btn-login:hover {
      background: #25692b;
    }

    .login-footer {
      text-align: center;
      padding: 16px 24px 24px;
      font-size: 0.9rem;
      color: #555;
    }

    .login-footer a {
      color: #2e7d32;
      text-decoration: none;
    }

    .alert {
      display: none;
      margin-bottom: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      background: #fdecea;
      color: #b71c1c;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-header">
      <h1>Acceso Farmacia</h1>
      <p>Inicia sesión para gestionar pedidos y clientes.</p>
    </div>
    <div class="login-form">
      <div class="alert" id="alert"></div>
      <div class="form-group">
        <label for="email">Correo electrónico</label>
        <input type="email" id="email" placeholder="ejemplo@farmacia.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="********" required>
      </div>
      <div class="form-actions">
        <label><input type="checkbox" id="remember"> Recuérdame</label>
        <a href="#">¿Olvidaste tu contraseña?</a>
      </div>
      <button class="btn-login" id="loginBtn">Iniciar sesión</button>
    </div>
    <div class="login-footer">
      ¿Nuevo en la farmacia? <a href="#">Crear cuenta de empleado</a>
    </div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const alertBox = document.getElementById('alert');

    loginBtn.addEventListener('click', () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      if (!email || !password) {
        showAlert('Por favor completa todos los campos.');
        return;
      }

      if (!validateEmail(email)) {
        showAlert('Introduce un correo electrónico válido.');
        return;
      }

      // Simulación de envío de formulario de login
      alertBox.style.display = 'none';
      loginBtn.textContent = 'Validando...';
      loginBtn.disabled = true;

      setTimeout(() => {
        loginBtn.textContent = 'Iniciar sesión';
        loginBtn.disabled = false;
        alert('¡Bienvenido a la plataforma de farmacia!');
      }, 1200);
    });

    function showAlert(message) {
      alertBox.textContent = message;
      alertBox.style.display = 'block';
    }

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }
  </script>
</body>
</html>
